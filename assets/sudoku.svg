<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" ry="6" fill="#faf8f5"/>
  <!-- Hand-drawn S: wobble baked into the path, no filters needed -->
  <g>
    <!-- Main S spine — thick crayon stroke with organic wobble -->
    <path
      d="M 21.2 7.5 C 20.1 6.1 17.2 4.8 14.5 5.2 C 11.6 5.7 9.2 7.4 9 10 C 8.8 12.2 10.4 13.8 12.5 15 C 14.2 15.9 16.8 16.4 18.8 17.3 C 21.2 18.4 22.8 20.2 22.2 23 C 21.5 25.8 18.5 27.8 15.2 27.5 C 12.4 27.3 10.2 26 9.5 24.2"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="3.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Second pass: slightly offset for crayon double-stroke feel -->
    <path
      d="M 21 7.8 C 19.8 6.3 17 5.1 14.3 5.5 C 11.8 5.9 9.5 7.7 9.3 10.2 C 9.1 12.4 10.6 13.6 12.3 14.7 C 14.4 16 17.1 16.6 19 17.6 C 21.4 18.8 22.5 20.5 21.9 23.2 C 21.3 25.6 18.7 27.5 15.5 27.3 C 12.8 27.1 10.5 25.8 9.8 24"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.4"
    />
    <!-- Top serif flick -->
    <path
      d="M 21.2 7.5 C 22.4 8.2 23.1 9.3 22.3 9.8"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="2.6"
      stroke-linecap="round"
    />
    <!-- Bottom serif flick -->
    <path
      d="M 9.5 24.2 C 8.6 23.2 8.4 21.8 9.2 21.2"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="2.6"
      stroke-linecap="round"
    />
  </g>
</svg>
